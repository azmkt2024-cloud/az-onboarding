<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>손해보험설계사 핵심 요약집</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --p: #3182f6; --p-lt: #e8f1fd; --p-dk: #1b64da;
    --green: #0dab5c; --grn-lt: #e6f7ef;
    --red: #ef4444; --red-lt: #fef2f2;
    --g50: #f8fafc; --g100: #f1f5f9; --g200: #e2e8f0;
    --g300: #cbd5e1; --g400: #94a3b8; --g500: #64748b;
    --g600: #475569; --g700: #334155; --g800: #1e293b; --g900: #0f172a;
    --white: #ffffff; --r: 12px; --rsm: 8px; --rxs: 6px;
  }
  body { font-family: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--g50); color: var(--g800); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* ─── COVER ─── */
  #cover { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.5rem; background: linear-gradient(160deg,#fff 0%,#eef5fe 55%,#e8f1fd 100%); text-align:center; }
  .cover-logo { display:flex; align-items:center; gap:8px; margin-bottom:2.5rem; }
  .cover-logo-icon { width:36px; height:36px; background:var(--p); border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:18px; font-weight:800; }
  .cover-logo-text { font-size:16px; font-weight:700; color:var(--g700); }
  .cover-badge { display:inline-flex; align-items:center; gap:6px; background:var(--p-lt); color:var(--p); border-radius:100px; padding:5px 14px; font-size:13px; font-weight:600; margin-bottom:1.25rem; }
  .cover-title { font-size:clamp(2rem,5vw,3.25rem); font-weight:800; color:var(--g900); letter-spacing:-1px; line-height:1.15; margin-bottom:.75rem; }
  .cover-title em { color:var(--p); font-style:normal; }
  .cover-subtitle { font-size:16px; color:var(--g500); margin-bottom:2.5rem; }
  .cover-stats { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-bottom:2.5rem; }
  .cover-stat { background:var(--white); border:1px solid var(--g200); border-radius:var(--r); padding:16px 24px; box-shadow:0 1px 3px rgba(0,0,0,.1); min-width:100px; }
  .cover-stat-num { display:block; font-size:28px; font-weight:800; color:var(--p); letter-spacing:-.5px; }
  .cover-stat-label { font-size:13px; color:var(--g400); font-weight:500; }
  .cover-btn { background:var(--p); color:#fff; border:none; border-radius:100px; padding:15px 44px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .18s; box-shadow:0 4px 14px rgba(49,130,246,.35); }
  .cover-btn:hover { background:var(--p-dk); transform:translateY(-1px); box-shadow:0 6px 20px rgba(49,130,246,.4); }
  .cover-cheers { margin-top:1.5rem; font-size:14px; color:var(--g400); }

  /* ─── APP SHELL ─── */
  #app { display:none; min-height:100vh; }
  .topbar { position:sticky; top:0; z-index:100; background:rgba(255,255,255,.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--g200); padding:0 20px; height:56px; display:flex; align-items:center; gap:12px; }
  .tb-logo { display:flex; align-items:center; gap:7px; flex-shrink:0; }
  .tb-logo-icon { width:28px; height:28px; background:var(--p); border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:800; }
  .tb-logo-text { font-size:14px; font-weight:700; color:var(--g700); }
  .tb-divider { width:1px; height:18px; background:var(--g200); flex-shrink:0; }
  .tb-prog-wrap { flex:1; display:flex; align-items:center; gap:10px; min-width:0; }
  .tb-page-info { font-size:13px; color:var(--g400); font-weight:500; white-space:nowrap; }
  .prog-bg { flex:1; height:4px; background:var(--g200); border-radius:2px; overflow:hidden; }
  .prog-fill { height:100%; background:var(--p); border-radius:2px; transition:width .4s ease; }
  .tb-pct { font-size:13px; color:var(--p); font-weight:700; white-space:nowrap; }
  .tb-back { background:var(--g100); border:none; color:var(--g600); border-radius:var(--rxs); padding:6px 12px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; flex-shrink:0; }
  .tb-back:hover { background:var(--g200); }

  /* ─── PAGE ─── */
  .page-wrap { max-width:860px; margin:0 auto; padding:28px 20px 60px; }
  .page-header { margin-bottom:20px; }
  .part-chip { display:inline-flex; align-items:center; border-radius:100px; padding:4px 12px; font-size:12px; font-weight:700; margin-bottom:10px; }
  .page-title-main { font-size:clamp(1.25rem,3vw,1.6rem); font-weight:800; color:var(--g900); letter-spacing:-.5px; margin-bottom:4px; line-height:1.25; }
  .page-qcount { font-size:13px; color:var(--g400); font-weight:500; }

  /* ─── CARDS ─── */
  .section { background:var(--white); border:1px solid var(--g200); border-radius:var(--r); padding:20px; margin-bottom:12px; box-shadow:0 1px 2px rgba(0,0,0,.06); }
  .section-title { font-size:14px; font-weight:700; color:var(--g800); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .section-title::before { content:''; width:3px; height:14px; background:var(--p); border-radius:2px; flex-shrink:0; }
  .content-text { font-size:14px; line-height:1.85; color:var(--g600); }
  .hl        { color:#1d4ed8; font-weight:700; }
  .hl-yellow { color:#b45309; font-weight:700; }
  .hl-green  { color:#166534; font-weight:700; }
  .hl-blue   { color:var(--p-dk); font-weight:700; }
  .hl-red    { color:var(--red); font-weight:700; }
  .hl-purple { color:#7c3aed; font-weight:700; }

  /* ─── TABLE ─── */
  .content-table { width:100%; border-collapse:collapse; font-size:13px; margin:10px 0; border-radius:var(--rsm); overflow:hidden; border:1px solid var(--g200); }
  .content-table th { background:var(--g50); color:var(--g700); font-weight:700; padding:9px 12px; text-align:left; border-bottom:1px solid var(--g200); font-size:12.5px; }
  .content-table td { padding:8px 12px; border-bottom:1px solid var(--g100); color:var(--g600); vertical-align:top; font-size:13px; }
  .content-table tr:last-child td { border-bottom:none; }
  .content-table tr:hover td { background:var(--g50); }

  /* ─── LIST ─── */
  .content-list { list-style:none; padding:0; margin:6px 0; }
  .content-list li { padding:4px 0 4px 18px; position:relative; font-size:14px; color:var(--g600); line-height:1.75; }
  .content-list li::before { content:'•'; position:absolute; left:4px; color:var(--p); font-weight:700; font-size:12px; top:6px; }
  .content-list.num { counter-reset:lc; }
  .content-list.num li::before { content:counter(lc)'.'; counter-increment:lc; font-weight:700; color:var(--g400); font-size:12px; top:4px; }

  /* ─── CALLOUT BOXES ─── */
  .wrong-box { background:var(--red-lt); border:1px solid #fecaca; border-radius:var(--rxs); padding:10px 14px; margin:8px 0; font-size:13px; color:#991b1b; line-height:1.7; }
  .wrong-box::before { content:'✗ 오답유형  '; font-weight:700; color:var(--red); }
  .tip-box { background:var(--grn-lt); border:1px solid #a7f3d0; border-radius:var(--rxs); padding:10px 14px; margin:8px 0; font-size:13px; color:#065f46; line-height:1.7; }
  .tip-box::before { content:'💡 Plus Tip!  '; font-weight:700; color:var(--green); }
  .exam-box { background:#fffbeb; border:1px solid #fde68a; border-radius:var(--rxs); padding:10px 14px; margin:8px 0; font-size:13px; color:#78350f; line-height:1.7; }
  .exam-box::before { content:'📝 출제유형  '; font-weight:700; color:#d97706; }
  .memo-box { background:#eff6ff; border:1px solid #bfdbfe; border-radius:var(--rxs); padding:10px 14px; margin:8px 0; font-size:13px; color:#1e40af; line-height:1.7; }

  /* ─── GRID / MINI-CARD ─── */
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:8px 0; }
  @media(max-width:560px){
    .grid-2 { grid-template-columns:1fr; }
    .section { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .content-table { min-width:480px; font-size:12px; }
    .content-table th, .content-table td { padding:7px 9px; word-break:keep-all; }
  }
  .mini-card { background:var(--g50); border:1px solid var(--g200); border-radius:var(--rsm); padding:12px 14px; }
  .mini-card-title { font-size:13px; font-weight:700; color:var(--g700); margin-bottom:6px; }
  .mini-card-body { font-size:13px; color:var(--g600); line-height:1.7; }

  /* ─── HIGHLIGHT SECTION ─── */
  .highlight-section { background:linear-gradient(135deg,var(--p-lt),#f0f7ff); border:1px solid #bfdbfe; border-radius:var(--r); padding:18px 20px; margin-bottom:12px; }

  /* ─── BOTTOM NAV ─── */
  .page-nav { display:flex; justify-content:space-between; align-items:center; margin-top:24px; padding-top:20px; border-top:1px solid var(--g200); gap:12px; }
  .nav-btn { background:var(--white); border:1px solid var(--g200); color:var(--g700); border-radius:var(--rsm); padding:10px 22px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; box-shadow:0 1px 2px rgba(0,0,0,.06); }
  .nav-btn:hover { background:var(--g50); border-color:var(--g300); }
  .nav-btn:disabled { opacity:.35; cursor:not-allowed; box-shadow:none; }
  .nav-btn.primary { background:var(--p); border-color:var(--p); color:#fff; box-shadow:0 2px 8px rgba(49,130,246,.25); }
  .nav-btn.primary:hover { background:var(--p-dk); border-color:var(--p-dk); }
  .page-indicator { font-size:13px; color:var(--g400); font-weight:500; }

  /* ─── TOC ─── */
  .toc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:8px; margin:12px 0; }
  .toc-item { background:var(--g50); border:1px solid var(--g200); border-radius:var(--rsm); padding:10px 14px; cursor:pointer; transition:all .15s; }
  .toc-item:hover { background:var(--p-lt); border-color:#93c5fd; }
  .toc-num { font-size:11px; color:var(--g400); font-weight:600; margin-bottom:3px; }
  .toc-name { font-size:13px; color:var(--g700); line-height:1.4; font-weight:500; }

  /* ─── UTILS ─── */
  .divider { height:1px; background:var(--g200); margin:12px 0; }
  .mb { margin-bottom:10px; } .mt { margin-top:10px; }
  p.indent { padding-left:1em; } p.indent2 { padding-left:2em; }
  .badge { display:inline-block; padding:2px 8px; border-radius:100px; font-size:11.5px; font-weight:700; margin-right:3px; }
  .badge-orange { background:#fff7ed; color:#ea580c; }
  .badge-blue   { background:var(--p-lt); color:var(--p); }
  .badge-green  { background:var(--grn-lt); color:#15803d; }
  .badge-red    { background:var(--red-lt); color:var(--red); }
  .badge-purple { background:#f5f3ff; color:#7c3aed; }
  .badge-teal   { background:#f0fdfa; color:#0d9488; }
  sub-note { display:block; font-size:12.5px; color:var(--g400); padding-left:1em; margin-top:2px; }
  .scroll-top { position:fixed; bottom:24px; right:24px; background:var(--p); color:#fff; border:none; border-radius:50%; width:42px; height:42px; font-size:18px; cursor:pointer; opacity:0; transition:opacity .25s; z-index:200; box-shadow:0 4px 6px rgba(0,0,0,.07); }
  .scroll-top.visible { opacity:1; }

</style>
</head>

// ══════════════════════════════════════════

const pages = [

// ─────────────── PAGE 1 ─────────────────
{ title: 'Part 1 — 보험이론·윤리', part: 'Part 1', partColor: '#ea580c', partBg: '#fff7ed', qCount: '01. 모집종사자의 이해 및 윤리규범 (4문항)',
  html: `
<div class="section">
  <div class="section-title">1. 보험의 모집</div>
  <div class="content-text mb">
    <span class="hl">모집</span>이란? 보험회사를 위하여 계약 체결을 <span class="hl-yellow">중개</span> 또는 <span class="hl">대리</span>하는 것<br>

  </div>
  <table class="content-table">
    <tr><th>구분</th><th>계약체결권</th><th>고지의무수령권</th><th>보험료수령권</th><th>등록기관</th></tr>
    <tr><td>설계사</td><td style="color:#f87171">✗</td><td style="color:#f87171">✗</td><td style="color:#f87171">✗</td><td>금융위원회(손보협회 위탁)</td></tr>
    <tr><td>대리점</td><td style="color:#4ade80">✓</td><td style="color:#4ade80">✓</td><td style="color:#4ade80">✓</td><td>금융위원회(손보협회 위탁)</td></tr>
    <tr><td>중개사</td><td style="color:#f87171">✗</td><td style="color:#f87171">✗</td><td style="color:#f87171">✗</td><td>금융위원회(금융감독원 위탁)</td></tr>

{ title: '보험대리점 / 재무설계 / 모집 프로세스', part: 'Part 1', partColor: '#ea580c', partBg: '#fff7ed', qCount: '01. 모집종사자의 이해 및 윤리규범 (계속)',
  html: `
<div class="section">
  <div class="section-title">3. 보험대리점 (여러 보험회사와 계약체결 가능, 회사 수 제한 없음)</div>

let currentPage = 0;

function startApp() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderPage(0);
}

function goBack() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('cover').style.display = 'flex';
}

function renderPage(idx) {
  currentPage = idx;
  const page = pages[idx];
  const total = pages.length;
  const pct = Math.round(((idx + 1) / total) * 100 * 10) / 10;

  document.getElementById('nav-page-info').textContent = (idx + 1) + ' / ' + total;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('nav-percent').textContent = pct + '%';

  const container = document.getElementById('page-container');
  container.innerHTML = `
    <div class="page-header">
      <span class="part-chip" style="background:${page.partBg};color:${page.partColor}">${page.part}</span>
      <h1 class="page-title-main">${page.title}</h1>
      ${page.qCount ? `<p class="page-qcount">📋 ${page.qCount}</p>` : ''}
    </div>
    ${page.html}
    <div class="page-nav">
      <button class="nav-btn" onclick="goToPage(${idx - 1})" ${idx === 0 ? 'disabled' : ''}>← 이전</button>
      <span class="page-indicator">${idx + 1} / ${total}</span>
      <button class="nav-btn primary" onclick="goToPage(${idx + 1})" ${idx === total - 1 ? 'disabled' : ''}>다음 →</button>
    </div>
  `;

  // Build TOC if page 0
  if (idx === 0) {
    const toc = document.getElementById('toc');
    if (toc) {
      toc.innerHTML = tocData.map(t => `
        <div class="toc-item" onclick="goToPage(${t.p - 1})">
          <div class="toc-num">PAGE ${t.p}</div>
          <div class="toc-name">${t.n}</div>
        </div>
      `).join('');
    }
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToPage(idx) {
  if (idx < 0 || idx >= pages.length) return;
  renderPage(idx);
}

// scroll to top button
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scroll-top');
  if (window.scrollY > 300) btn.classList.add('visible');
  else btn.classList.remove('visible');
});

// keyboard navigation
document.addEventListener('keydown', (e) => {
  if (document.getElementById('app').style.display === 'none') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goToPage(currentPage + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goToPage(currentPage - 1);
});
